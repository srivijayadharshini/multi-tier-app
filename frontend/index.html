<!DOCTYPE html>
<html>
<head>
  <title>Student Result Management System</title>

  <style>

    body {
      font-family: Arial, sans-serif;
      background: #f4f6f9;
      margin: 0;
      padding: 0;
    }

    .container {
      width: 80%;
      margin: 30px auto;
      background: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0px 0px 10px rgba(0,0,0,0.2);
    }

    h1 {
      text-align: center;
      color: #2c3e50;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    button {
      margin-top: 15px;
      padding: 10px 20px;
      border: none;
      border-radius: 5px;
      background: #3498db;
      color: white;
      cursor: pointer;
      font-size: 16px;
    }

    button:hover {
      background: #2980b9;
    }

    table {
      width: 100%;
      margin-top: 20px;
      border-collapse: collapse;
    }

    table, th, td {
      border: 1px solid #ccc;
    }

    th {
      background: #3498db;
      color: white;
      padding: 10px;
    }

    td {
      padding: 10px;
      text-align: center;
    }

  </style>

</head>
<body>

<div class="container">

  <h1>Student Result Management System</h1>

  <input type="text" id="name" placeholder="Student Name">

  <input type="text" id="regno" placeholder="Register Number">

  <input type="text" id="department" placeholder="Department">

  <input type="number" id="mark1" placeholder="Subject 1 Mark">

  <input type="number" id="mark2" placeholder="Subject 2 Mark">

  <input type="number" id="mark3" placeholder="Subject 3 Mark">

  <button onclick="addStudent()">Add Student</button>

  <button onclick="viewStudents()">View Results</button>

  <table>

    <thead>
      <tr>
        <th>Name</th>
        <th>Reg No</th>
        <th>Department</th>
        <th>Total</th>
        <th>Average</th>
        <th>Result</th>
      </tr>
    </thead>

    <tbody id="tableBody">
    </tbody>

  </table>

</div>

<script>

const API_URL = 'http://43.205.125.243:3000';

async function addStudent() {

  const student = {
    name: document.getElementById('name').value,
    regno: document.getElementById('regno').value,
    department: document.getElementById('department').value,
    mark1: Number(document.getElementById('mark1').value),
    mark2: Number(document.getElementById('mark2').value),
    mark3: Number(document.getElementById('mark3').value)
  };

  await fetch(`${API_URL}/addStudent`, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json'
    },
    body: JSON.stringify(student)
  });

  alert('Student Added Successfully');

  viewStudents();
}

async function viewStudents() {

  const response = await fetch(`${API_URL}/students`);

  const students = await response.json();

  const tableBody = document.getElementById('tableBody');

  tableBody.innerHTML = '';

  students.forEach(student => {

    tableBody.innerHTML += `
      <tr>
        <td>${student.name}</td>
        <td>${student.regno}</td>
        <td>${student.department}</td>
        <td>${student.total}</td>
        <td>${student.average}</td>
        <td>${student.result}</td>
      </tr>
    `;

  });
}

</script>

</body>
</html>
